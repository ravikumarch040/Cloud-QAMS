{{- range $name, $service := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qams-{{ $name }}
  labels:
    app.kubernetes.io/name: qams-{{ $name }}
    app.kubernetes.io/part-of: qams
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qams-{{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qams-{{ $name }}
        app.kubernetes.io/part-of: qams
    spec:
      containers:
        - name: api
          image: "{{ $.Values.global.imageRegistry }}{{ $service.image }}:{{ $service.tag }}"
          ports:
            - containerPort: {{ $service.port }}
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "{{ $.Values.global.environment }}"
---
{{- end }}
